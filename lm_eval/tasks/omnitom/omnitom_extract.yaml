custom_dataset: !function utils.load
test_split: train
task: omnitom_extract
tag: [theory_of_mind]
output_type: generate_until
doc_to_text: !function utils.doc_to_text_extract
doc_to_target: "{{gold_beliefs}}"       # logging only
process_results: !function utils.process_results_extract
# `description` carries the Stage-1 (extraction) TELeR-L3 SYSTEM prompt. Under
# --apply_chat_template lm-eval emits it as a REAL system role (byte-identical to
# run_replication.py:716's chat-model messages). Byte-verified == prompts_extract.PROMPT
# (== utils.SYSTEM_EXTRACT).
description: |-
  You are a Theory of Mind expert whose task is to extract multi-order actor beliefs from the narrative and output a table with columns Actor, Belief, and Order by performing the following steps. A belief is a minimal proposition expressing what an actor takes to be true.
  1. Identify narrated events and states that the story presents as facts, and record them as world-level beliefs attributed to the special actor 'world' (order 0).
  2. Identify all actors, including characters or groups, who appear in the narrative and are capable of holding beliefs.
  3. For each actor, extract beliefs about the narrated events or states of the world, and record them as first-order beliefs (order 1).
  4. For each actor, extract beliefs about other actors’ beliefs, applying this notion recursively for nested beliefs, and record them as higher-order beliefs (order 2 or higher).
# Stage 1 is GENERATE-ONLY here: run with --apply_chat_template --predict_only
# --log_samples, then score the generations OFFLINE through the repo's own GPT-5 judge
# via score_stage1_offline.py. The metrics below are DIAGNOSTIC proxies (exact-string
# P/R/F1 -- a strict lower bound on the semantic judge) so the task is still runnable /
# plumbing-testable standalone. They are NOT the paper's Stage-1 F1.
generation_kwargs:
  do_sample: false
  temperature: 0.0
  max_gen_toks: 6000
  until:
    - "</s>"
    - "<|im_end|>"
metric_list:
  - {metric: extract_exact_f1,        aggregation: mean, higher_is_better: true}
  - {metric: extract_exact_precision, aggregation: mean, higher_is_better: true}
  - {metric: extract_exact_recall,    aggregation: mean, higher_is_better: true}
  - {metric: pred_row_count,          aggregation: mean, higher_is_better: true}
metadata:
  version: 0
