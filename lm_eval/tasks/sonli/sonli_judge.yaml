custom_dataset: !function utils.load_judge
task: sonli_judge
dataset_kwargs:
  data_file: null
test_split: train
output_type: generate_until
doc_to_text: !function utils.doc_to_text_judge
doc_to_target: "{{target}}"
process_results: !function utils.process_results_judge
generation_kwargs:
  # The benchmark judge emits rubric prose plus SCORE: X; do not stop on newline.
  until:
    - "</s>"
    - "<|im_end|>"
  do_sample: true
  temperature: 0.7
  max_gen_toks: 5000
metric_list:
  - {metric: pearson, aggregation: !function utils.agg_pearson, higher_is_better: true}
  - {metric: mae, aggregation: !function utils.agg_mae, higher_is_better: false}
  - {metric: parse_rate, aggregation: !function utils.agg_parse_rate, higher_is_better: true}
  - {metric: paired_rate, aggregation: !function utils.agg_paired_rate, higher_is_better: true}
metadata:
  version: 0
